<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>😂Joke Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="index.js" defer></script>
    <link rel="shortcut icon" href="https://res.cloudinary.com/duoibszqt/image/upload/v1775046912/samples/zoom.avif">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?/family=Manrope:wght@200..800&display=swap">

    <style>
        body{
            font-family: 'Manrope', sans-serif;
        }
    </style>

</head>
<body class="bg-gradient-to-r from-gray-900 via-pink-500 to-purple-900 flex justify-center items-center min-h-screen">
    <div  class="bg-white/30 backdrop-blur-md border border-white/20 p-8 font-semibold flex flex-col items-center py-16 rounded-xl w-full max-w-sm md:max-w-md space-y-6 shadow-lg relative">
        <p id="id" class="text-xs text-purple-900">Random Joke hub 😂 ...</p>
        <p id="joke" class="text-md text-center italic">Click the button to get a joke 😄 </p>
        <div>
            <img class="hidden md:block" src="https://res.cloudinary.com/duoibszqt/image/upload/v1777889701/pattern-divider-desktop_px646z.svg" alt="desktop pattern">
            <img class="block md:hidden" src="https://res.cloudinary.com/duoibszqt/image/upload/v1777889691/pattern-divider-mobile_xswkro.svg" alt="mobile pattern">
       
        </div>
        <button id="btn" class=" bg-white p-4 rounded-full absolute -bottom-4 opacity-65 hover:opacity-100">
            <img src="https://res.cloudinary.com/duoibszqt/image/upload/v1777890798/icon-dice_us4gdb.svg" alt="icon">
        </button>
    </div>

    
</body>
</html>
